# Intel VCA2 host-side load ordering for DKMS modules.
# vca_csa is a card-side agent and conflicts with host vca_csm by creating /sys/class/vca.
blacklist vca_csa

softdep plx87xx pre: vop_bus vop vca_csm_bus vca_mgr_bus vca_mgr_extd_bus vca_csa_bus vca_virtio vca_virtio_ring vca_vringh vca_virtio_net vcablkfe vcablk_bckend vca_csm vca_mgr vca_mgr_extd plx87xx_dma
